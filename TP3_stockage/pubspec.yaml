name: tp2flutter
description: "Projet Flutter Bloc-Notes."
# Empêche la publication accidentelle sur pub.dev (`flutter pub publish`).
publish_to: 'none' # Supprimer cette ligne pour publier sur pub.dev.

# Numéro de version (x.y.z) et éventuellement numéro de build après +.
# Surcharge possible via --build-name et --build-number lors du build.
# Android : build-name → versionName, build-number → versionCode.
# Plus d'infos : https://developer.android.com/studio/publish/versioning
# iOS : build-name → CFBundleShortVersionString, build-number → CFBundleVersion.
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# Windows : build-name pour les parties majeure/mineure/correctif, build-number pour le suffixe.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dépendances du projet. Mise à jour : `flutter pub upgrade --major-versions`
# ou modification manuelle des versions ; `flutter pub outdated` pour voir les mises à jour.
dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2 
  http: ^1.2.0 

  # Police d'icônes Cupertino (classe CupertinoIcons).
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Base SQLite pour les tests unitaires sur machine (desktop / CI).
  sqflite_common_ffi: ^2.3.0

  # Règles de lint recommandées ; activation dans analysis_options.yaml à la racine.
  flutter_lints: ^6.0.0

# Documentation pubspec Dart : https://dart.dev/tools/pub/pubspec

# Section spécifique aux packages Flutter.
flutter:

  # Inclut la police Material Icons pour la classe Icons.
  uses-material-design: true

  # Exemple d'assets :
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # Images multi-résolution : https://flutter.dev/to/resolution-aware-images
  # Assets depuis un package : https://flutter.dev/to/asset-from-package

  # Polices personnalisées (exemple commenté) :
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # Polices depuis un package : https://flutter.dev/to/font-from-package
connectivity_plus: ^6.0.0